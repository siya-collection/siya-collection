<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siya Collection | Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'serif', 'Playfair Display', serif;
            background: #fdfaf6; /* Soft cream background */
            color: #2c2c2c;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in;
            padding: 20px;
        }

        .logo {
            font-size: 3.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 10px;
            border-bottom: 1px solid #d4af37; /* Gold accent line */
            display: inline-block;
            padding-bottom: 10px;
        }

        .sub-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #666;
            margin-top: 20px;
        }

        .launch-date {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d4af37; /* Gold color */
            margin-top: 10px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #999;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .logo { font-size: 2rem; }
            .sub-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">Siya Collection</h1>
        <p class="sub-text">A NEW ERA OF FASHION IS LAUNCHING SOON</p>
        <p class="launch-date"><br>www.siyacollection2026.in
        </p>
    </div>

    <div class="footer">
        © 2026 SIYA COLLECTION | PUNE, INDIA
    </div>

</body>
</html>
